<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Snake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0a0a0f;color:#fff;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none}
.s{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column}
.s.active{display:flex}
#start{background:radial-gradient(ellipse 50% 30%,#1a1a2e,#0a0a0f 70%)}
h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;background:linear-gradient(#fff,#4ade80,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.sub{color:rgba(255,255,255,0.5);margin-bottom:30px;letter-spacing:2px;font-size:0.9rem}
.btn{background:linear-gradient(#4ade80,#22c55e);color:#0a0a0f;border:none;padding:15px 50px;font-size:1.1rem;font-weight:700;border-radius:50px;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
.high{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.05);padding:8px 16px;border-radius:20px;font-size:0.85rem}
.high span{color:#4ade80;font-weight:700}
#game{cursor:crosshair}
#gc{width:100%;height:100%;display:block}
.h{position:fixed;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.b{background:rgba(21,21,32,0.9);padding:10px 20px;border-radius:25px}
.l{font-size:0.55rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.v{font-size:1.4rem;font-weight:900;color:#4ade80}
.pro{position:fixed;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1)}
.pb{height:100%;background:#4ade80;width:100%}
#over{background:rgba(10,10,15,0.97)}
.tk{font-size:3rem;margin-bottom:10px}
.fs{font-size:3rem;font-weight:900;color:#4ade80}
.fl{color:rgba(255,255,255,0.5);margin-bottom:25px}
.st{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:250px;margin-bottom:25px}
.sc{background:#151520;padding:12px;border-radius:12px;text-align:center}
.sv{font-size:1.1rem;font-weight:700;color:#4ade80}
.sl{font-size:0.55rem;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:3px}
.nh{color:#ff6b6b;font-weight:700;margin-bottom:15px;display:none;animation:p 0.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div id="start" class="s active">
<div class="high">HIGH: <span id="hscore">0</span></div>
<h1>SNAKE</h1>
<div class="sub">SPIS ÆBLER - VOKS</div>
<button class="btn" id="sb">SPIL</button>
</div>
<div id="game" class="s">
<canvas id="gc"></canvas>
<div class="h">
<div class="b"><div class="l">Score</div><div class="v" id="sc">0</div></div>
<div class="b"><div class="l">Tid</div><div class="v" id="tm">1:00</div></div>
</div>
<div class="pro"><div class="pb" id="pb"></div></div>
</div>
<div id="over" class="s">
<div class="tk">SNAKE</div>
<div class="nh" id="nhs">NY HIGH!</div>
<div class="fs" id="fs">0</div>
<div class="fl">points</div>
<div class="st">
<div class="sc"><div class="sv" id="len">0</div><div class="sl">Langde</div></div>
<div class="sc"><div class="sv" id="ap">0</div><div class="sl">bler</div></div>
</div>
<button class="btn" id="rb">SPIL IGEN</button>
</div>
<script>
var hs=localStorage.getItem('snakeHS')||'0';
document.getElementById('hscore').innerText=hs;
var c=document.getElementById('gc');
var x=c.getContext('2d');
function rz(){c.width=window.innerWidth;c.height=window.innerHeight}
window.onresize=rz;rz();
var sc=0,tm=60,pl=false;
var sn=[],ap={},dir={x:1,y:0},nx=1,ny=0;
var gs=20,gid,sid;
function st(){
sc=0;tm=60;pl=true;
sn=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
dir={x:1,y:0};nx=1;ny=0;
sp();
document.getElementById('start').classList.remove('active');
document.getElementById('over').classList.remove('active');
document.getElementById('game').classList.add('active');
uph();lp();
}
function sp(){
ap={x:Math.floor(Math.random()*(c.width/gs-2))+1,y:Math.floor(Math.random()*(c.height/gs-4))+2};
}
function lp(){
if(!pl)return;
x.fillStyle='#0a0a0f';x.fillRect(0,0,c.width,c.height);
//Grid
x.strokeStyle='rgba(255,255,255,0.03)';
for(var i=0;i<c.width;i+=gs){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
for(var i=0;i<c.height;i+=gs){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke()}
//Move
setTimeout(function(){
if(!pl)return;
var h=sn[0];
nx=dir.x;ny=dir.y;
var nn={x:h.x+nx,y:h.y+ny};
if(nn.x<0)nn.x=Math.floor(c.width/gs)-1;
if(nn.x>=Math.floor(c.width/gs))nn.x=0;
if(nn.y<2)nn.y=Math.floor(c.height/gs)-1;
if(nn.y>=Math.floor(c.height/gs))nn.y=2;
//Self collision
for(var i=0;i<sn.length;i++){
if(sn[i].x==nn.x&&sn[i].y==nn.y){nd();return}
}
sn.unshift(nn);
//Eat apple
if(nn.x==ap.x&&nn.y==ap.y){
sc+=10+sn.length;
sp();
}else{
sn.pop()
}
tm--;
if(tm<=0){nd();return;}
uph();lp();
},120);
}
function uph(){
document.getElementById('sc').innerText=sc;
var m=Math.floor(tm/60),s=tm%60;
document.getElementById('tm').innerText=m+':'+(s<10?'0':'')+s;
document.getElementById('pb').style.width=(tm/60*100)+'%';
//Draw
x.fillStyle='#4ade80';
for(var i=0;i<sn.length;i++){
var s=sn[i],r=i==0?1.2:1;
x.beginPath();x.arc(s.x*gs+gs/2,s.y*gs+gs/2,gs*r/2-1,0,7);x.fill()
}
x.fillStyle='#ef4444';
x.beginPath();x.arc(ap.x*gs+gs/2,ap.y*gs+gs/2,gs*0.8/2,0,7);x.fill()
}
function nd(){
pl=false;
var h=parseInt(localStorage.getItem('snakeHS')||'0');
var nh=sc>h;if(nh)localStorage.setItem('snakeHS',sc);
document.getElementById('game').classList.remove('active');
document.getElementById('over').classList.add('active');
document.getElementById('fs').innerText=sc;
document.getElementById('nhs').style.display=nh?'block':'none';
document.getElementById('len').innerText=sn.length;
document.getElementById('ap').innerText=Math.floor(sc/20);
}
document.addEventListener('keydown',function(e){
if(!pl)return;
if(e.key=='ArrowUp'&&dir.y!=1){dir={x:0,y:-1}}
else if(e.key=='ArrowDown'&&dir.y!=-1){dir={x:0,y:1}}
else if(e.key=='ArrowLeft'&&dir.x!=1){dir={x:-1,y:0}}
else if(e.key=='ArrowRight'&&dir.x!=-1){dir={x:1,y:0}}
});
var sx,sy;
document.getElementById('game').ontouchstart=function(e){
e.preventDefault();
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
};
document.getElementById('game').ontouchmove=function(e){
e.preventDefault();
};
document.getElementById('game').ontouchend=function(e){
if(!pl)return;
var ex=e.changedTouches[0].clientX;
var ey=e.changedTouches[0].clientY;
var dx=ex-sx,dy=ey-sy;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>30&&dir.x!=-1)dir={x:1,y:0}
else if(dx<-30&&dir.x!=1)dir={x:-1,y:0}
}else{
if(dy>30&&dir.y!=-1)dir={x:0,y:1}
else if(dy<-30&&dir.y!=1)dir={x:0,y:-1}
}
};
document.getElementById('sb').onclick=st;
document.getElementById('rb').onclick=st;
</script>
</body>
</html>
