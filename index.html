<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Snake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none}
.s{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000}
.s.active{display:flex}
#start{background:#000}
h1{font-size:clamp(2.5rem,10vw,4rem);font-weight:900;color:#22c55e;text-shadow:0 0 30px #22c55e;margin-bottom:10px}
.sub{color:#666;margin-bottom:30px;font-size:1rem}
.btn{background:#22c55e;color:#000;border:none;padding:18px 55px;font-size:1.2rem;font-weight:700;border-radius:50px;text-transform:uppercase}
.high{position:absolute;top:20px;right:20px;background:#1a1a2e;padding:12px 20px;border-radius:15px;font-size:0.9rem}
.high span{color:#22c55e;font-weight:700}
#gc{width:100%;height:100%;background:#080808;display:block}
.h{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.b{background:#1a1a2e;padding:10px 20px;border-radius:18px}
.l{font-size:0.55rem;color:#666;text-transform:uppercase}
.v{font-size:1.4rem;font-weight:900;color:#22c55e}
#over{background:#000}
.tk{font-size:2.5rem;color:#22c55e;margin-bottom:10px}
.fs{font-size:3rem;font-weight:900;color:#fff}
.fl{color:#666;margin-bottom:25px}
.st{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:220px;margin-bottom:25px}
.sc{background:#1a1a2e;padding:12px;border-radius:12px;text-align:center}
.sv{font-size:1.2rem;font-weight:700;color:#22c55e}
.sl{font-size:0.55rem;color:#666;text-transform:uppercase;margin-top:4px}
.nh{color:#ff4444;font-weight:700;margin-bottom:15px;display:none}
.tut{position:absolute;bottom:50px;color:#555;font-size:0.85rem}
</style>
</head>
<body>
<div id="start" class="s active">
<div class="high">HIGH: <span id="hscore">0</span></div>
<h1>SNAKE</h1>
<div class="sub">BLIV STØRRE - BLIV HURTIGERE</div>
<button class="btn" id="sb">START</button>
<div class="tut">Swipe for at styre</div>
</div>
<div id="game" class="s">
<canvas id="gc"></canvas>
<div class="h">
<div class="b"><div class="l">SCORE</div><div class="v" id="sc">0</div></div>
<div class="b"><div class="l">STØRRELSE</div><div class="v" id="sz">3</div></div>
</div>
</div>
<div id="over" class="s">
<div class="tk">SLUT!</div>
<div class="nh" id="nhs">NY HIGH!</div>
<div class="fs" id="fs">0</div>
<div class="fl">POINT</div>
<div class="st">
<div class="sc"><div class="sv" id="len">3</div><div class="sl">Storrelse</div></div>
<div class="sc"><div class="sv" id="ap">0</div><div class="sl">bler spist</div></div>
</div>
<button class="btn" id="rb">PRØV IGEN</button>
</div>
<script>
// Eksotiske lyde
const ctx=new(window.AudioContext||window.webkitAudioContext)();
function play(type){
if(ctx.state=='suspended')ctx.resume();
if(type==='eat'){
var f=400+Math.random()*400;
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sine';osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(f,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(f*1.5,ctx.currentTime+0.1);
gain.gain.setValueAtTime(0.15,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);
osc.start();osc.stop(ctx.currentTime+0.15);
setTimeout(function(){
var o=ctx.createOscillator(),g=ctx.createGain();
o.type='sine';o.connect(g);g.connect(ctx.destination);
o.frequency.setValueAtTime(f*1.5,g.ctx.currentTime);
o.frequency.exponentialRampToValueAtTime(f*2,g.ctx.currentTime+0.1);
g.gain.setValueAtTime(0.1,g.ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,g.ctx.currentTime+0.1);
o.start();o.stop(g.ctx.currentTime+0.1);
},80);
}
if(type==='die'){
for(var i=0;i<5;i++){
setTimeout(function(){
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sawtooth';
osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(200+Math.random()*200,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.2);
gain.gain.setValueAtTime(0.15,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2);
osc.start();osc.stop(ctx.currentTime+0.2);
},i*60);
}
}
if(type==='start'){
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sine';osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(300,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.2);
gain.gain.setValueAtTime(0.1,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2);
osc.start();osc.stop(ctx.currentTime+0.2);
}
}
var hs=localStorage.getItem('snakeHS')||'0';
document.getElementById('hscore').innerText=hs;
var c=document.getElementById('gc');
var x=c.getContext('2d');
var sz=25;
function rz(){
c.width=window.innerWidth;c.height=window.innerHeight;
sz=Math.floor(Math.min(c.width,c.height)/18);
if(sz<15)sz=15;if(sz>30)sz=30;
}
window.onresize=rz;rz();
var sc=0,pl=false,speed=180;
var sn=[],ap={},nde={x:1,y:0},dir={x:1,y:0};
var gid;
function st(){
play('start');
sc=0;pl=true;speed=180;sn=[];
var cx=Math.floor(c.width/sz/2),cy=Math.floor(c.height/sz/2);
sn=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
nde={x:1,y:0};dir={x:1,y:0};sp();
document.getElementById('start').classList.remove('active');
document.getElementById('over').classList.remove('active');
document.getElementById('game').classList.add('active');lp();
}
function sp(){ap={x:Math.floor(Math.random()*(c.width/sz-2))+1,y:Math.floor(Math.random()*(c.height/sz-4))+2}}
function lp(){
if(!pl)return;
x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);
x.strokeStyle='#111';
for(var i=0;i<c.width;i+=sz){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
for(var i=0;i<c.height;i+=sz){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke()}
var h=sn[0],nn={x:h.x+nde.x,y:h.y+nde.y};
var mx=Math.floor(c.width/sz),my=Math.floor(c.height/sz);
if(nn.x<0)nn.x=mx-1;if(nn.x>=mx)nn.x=0;if(nn.y<0)nn.y=my-1;if(nn.y>=my)nn.y=0;
for(var i=0;i<sn.length;i++){if(sn[i].x==nn.x&&sn[i].y==nn.y){nd();return}}
sn.unshift(nn);
if(nn.x==ap.x&&nn.y==ap.y){
sc+=10+sn.length;
play('eat');
speed=Math.max(60,speed-5);
sp();
}else{sn.pop()}
x.fillStyle='#22c55e';
for(var i=0;i<sn.length;i++){
var s=sn[i],r=i==0?0.9:0.7;
x.beginPath();x.roundRect(s.x*sz+1,s.y*sz+1,sz-2,sz-2,r*4);x.fill()
}
x.fillStyle='#ff4444';x.beginPath();x.arc(ap.x*sz+sz/2,ap.y*sz+sz/2,sz*0.4,0,6.28);x.fill()
document.getElementById('sc').innerText=sc;
document.getElementById('sz').innerText=sn.length;
document.getElementById('len').innerText=sn.length;
document.getElementById('ap').innerText=Math.floor(sc/20);
gid=setTimeout(lp,speed);
}
function nd(){pl=false;clearTimeout(gid);play('die');
var h=parseInt(localStorage.getItem('snakeHS')||'0');
var nh=sc>h;if(nh)localStorage.setItem('snakeHS',sc);
document.getElementById('game').classList.remove('active');
document.getElementById('over').classList.add('active');
document.getElementById('fs').innerText=sc;
document.getElementById('nhs').style.display=nh?'block':'none';
}
var sx,sy;
document.getElementById('gc').ontouchstart=function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY};
document.getElementById('gc').ontouchend=function(e){
if(!pl)return;
var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
var dx=ex-sx,dy=ey-sy;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>25&&nde.x!==-1)dir={x:1,y:0}
else if(dx<-25&&nde.x!==1)dir={x:-1,y:0}
}else{
if(dy>25&&nde.y!==-1)dir={x:0,y:1}
else if(dy<-25&&nde.y!==1)dir={x:0,y:-1}
}nde={...dir};
};
document.addEventListener('keydown',function(e){
if(!pl)return;
if(e.key=='ArrowUp'&&nde.y!==1){dir={x:0,y:-1};nde={...dir}}
else if(e.key=='ArrowDown'&&nde.y!==-1){dir={x:0,y:1};nde={...dir}}
else if(e.key=='ArrowLeft'&&nde.x!==1){dir={x:-1,y:0};nde={...dir}}
else if(e.key=='ArrowRight'&&nde.x!==-1){dir={x:1,y:0};nde={...dir}}
});
document.getElementById('sb').onclick=st;
document.getElementById('rb').onclick=st;
</script>
</body>
</html>
